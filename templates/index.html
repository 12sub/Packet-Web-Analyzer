<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Packet Analyzer</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a18; }
    header { display:flex; align-items:center; gap:12px; padding:12px 20px; background:#fff;
             border-bottom:0.5px solid #d3d1c7; flex-wrap:wrap; }
    header h1 { font-size:15px; font-weight:500; flex:1; }
    .dot { width:8px;height:8px;border-radius:50%;background:#3B6D11;
           display:inline-block;animation:pulse 1.4s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.25} }
    .badge { font-size:12px;padding:3px 10px;border-radius:6px;border:0.5px solid #d3d1c7;
             color:#5f5e5a;background:#f1efe8; }
    main { padding:16px 20px; max-width:1200px; margin:0 auto; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
             gap:10px; margin-bottom:16px; }
    .card { background:#fff; border-radius:8px; border:0.5px solid #d3d1c7; padding:14px 16px; }
    .card-label { font-size:12px; color:#888780; margin-bottom:4px; }
    .card-val { font-size:22px; font-weight:500; font-family:monospace; }
    .card-val.danger { color:#a32d2d; }
    .mid, .bottom { display:grid; grid-template-columns:1.7fr 1fr; gap:12px; margin-bottom:16px; }
    .panel { background:#fff; border:0.5px solid #d3d1c7; border-radius:10px; padding:14px 16px; }
    .panel-title { font-size:11px; font-weight:500; color:#888780; text-transform:uppercase;
                   letter-spacing:.05em; margin-bottom:10px; }
    .feed-wrap { max-height:220px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; font-size:12px; font-family:monospace;
            table-layout:fixed; }
    th { font-size:11px; color:#888780; font-weight:400; text-align:left; padding:0 6px 6px; }
    td { padding:4px 6px; border-top:0.5px solid #e8e6e0; overflow:hidden;
         text-overflow:ellipsis; white-space:nowrap; }
    .ptag { font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;display:inline-block; }
    .ptag.TCP  { background:#E6F1FB;color:#0C447C; }
    .ptag.UDP  { background:#EAF3DE;color:#3B6D11; }
    .ptag.DNS  { background:#FAEEDA;color:#633806; }
    .ptag.ICMP { background:#FBEAF0;color:#72243E; }
    .ptag.HTTP { background:#EEEDFE;color:#3C3489; }
    tr.flagged td { background:#FCEBEB; }
    .bar-bg { width:100%;height:5px;background:#f1efe8;border-radius:3px;overflow:hidden; }
    .bar-fill { height:5px;background:#378ADD;border-radius:3px; }
    .filter-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .filter-bar input {
      font-size:12px; font-family:monospace; padding:4px 10px;
      border:0.5px solid #d3d1c7; border-radius:6px; background:#f9f8f5;
      color:#1a1a18; width:260px; outline:none;
    }
    .filter-bar input:focus { border-color:#378ADD; background:#fff; }
    .filter-bar button {
      font-size:12px; padding:4px 12px; border-radius:6px;
      border:0.5px solid #d3d1c7; background:#fff; color:#1a1a18;
      cursor:pointer;
    }
    .filter-bar button:hover { background:#f1efe8; }
    #filter-status { font-size:12px; font-family:monospace; }
    .filter-ok  { color:#3B6D11; }
    .filter-err { color:#a32d2d; }
  </style>
</head>
<body>

<header>
  <h1>⬡ Packet Analyzer</h1>
  <span class="badge"><span class="dot"></span> Live capture</span>

  <!-- BPF filter input — submits via HTMX POST, swaps in status badge -->
  <div class="filter-bar">
    <input  id="bpf-input"
            type="text"
            name="filter"
            placeholder="BPF filter e.g. tcp port 443"
            value="{{.ActiveFilter}}"
            onkeydown="if(event.key==='Enter') applyFilter()"
    />
    <button onclick="applyFilter()">Apply</button>
    <button onclick="clearFilter()">Clear</button>
    <span id="filter-status"></span>
  </div>
</header>

<main>
  <!-- Summary cards — polled every 2s via HTMX -->
  <div class="cards" id="stat-cards"
       hx-get="/api/stats"
       hx-trigger="load, every 2s"
       hx-swap="none"
       hx-on::after-request="updateCards(event)">
    <div class="card"><div class="card-label">Total packets</div><div class="card-val" id="c-total">—</div></div>
    <div class="card"><div class="card-label">Data transferred</div><div class="card-val" id="c-data">—</div></div>
    <div class="card"><div class="card-label">Active connections</div><div class="card-val" id="c-conns">—</div></div>
    <div class="card"><div class="card-label">Flagged</div><div class="card-val danger" id="c-flag">—</div></div>
  </div>

  <div class="mid">
    <!-- Live packet feed via SSE -->
    <div class="panel">
      <div class="panel-title">Live packet feed</div>
      <div class="feed-wrap">
        <table>
          <thead><tr>
            <th style="width:22%">Src IP</th>
            <th style="width:22%">Dst IP</th>
            <th style="width:14%">Proto</th>
            <th style="width:12%">Size</th>
            <th style="width:30%">Time</th>
          </tr></thead>
          <tbody id="feed-body"
                 hx-ext="sse"
                 sse-connect="/sse/packets"
                 sse-swap="packet"
                 hx-swap="afterbegin">
          </tbody>
        </table>
      </div>
    </div>

    <!-- Protocol donut chart -->
    <div class="panel">
      <div class="panel-title">Protocol breakdown</div>
      <div style="position:relative;height:170px;">
        <canvas id="protoChart" role="img" aria-label="Protocol distribution donut chart">Protocol chart</canvas>
      </div>
      <div id="proto-legend" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;font-size:11px;color:#888780;"></div>
    </div>
  </div>

  <div class="bottom">
    <!-- Traffic line chart -->
    <div class="panel">
      <div class="panel-title">Traffic — packets / sec (30s window)</div>
      <div style="position:relative;height:150px;">
        <canvas id="trafficChart" role="img" aria-label="Line chart of packets per second over 30 seconds">Traffic chart</canvas>
      </div>
    </div>

    <!-- Top IPs table -->
    <div class="panel">
      <div class="panel-title">Top source IPs</div>
      <table>
        <thead><tr><th>IP</th><th>Pkts</th><th style="width:38%">Share</th></tr></thead>
        <tbody id="ip-body"></tbody>
      </table>
    </div>
  </div>
</main>

<script>
// --- BPF filter ---
function postFilter(expr) {
  const body = new URLSearchParams({ filter: expr });
  fetch('/capture/filter', { method: 'POST', body })
    .then(r => r.text())
    .then(html => {
      document.getElementById('filter-status').innerHTML = html;
      // auto-clear status after 4 seconds
      setTimeout(() => {
        const el = document.getElementById('filter-status');
        if (el) el.innerHTML = '';
      }, 4000);
    });
}
function applyFilter() {
  postFilter(document.getElementById('bpf-input').value.trim());
}
function clearFilter() {
  document.getElementById('bpf-input').value = '';
  postFilter('');
}

const PROTOS = ['TCP','UDP','DNS','ICMP','HTTP'];
const COLORS  = ['#378ADD','#3B6D11','#BA7517','#993356','#534AB7'];

// --- Protocol donut ---
const protoChart = new Chart(document.getElementById('protoChart'), {
  type: 'doughnut',
  data: { labels: PROTOS, datasets: [{ data: [1,1,1,1,1], backgroundColor: COLORS, borderWidth: 0 }] },
  options: { responsive:true, maintainAspectRatio:false, cutout:'65%',
             plugins:{ legend:{display:false} } }
});

// --- Traffic line chart ---
const trafficChart = new Chart(document.getElementById('trafficChart'), {
  type: 'line',
  data: {
    labels: Array(30).fill(''),
    datasets: [{ label:'pkt/s', data: Array(30).fill(0),
      borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,.07)',
      fill:true, tension:.35, pointRadius:0, borderWidth:1.5 }]
  },
  options: { responsive:true, maintainAspectRatio:false, animation:{duration:300},
    scales: {
      x: { display:false },
      y: { min:0, border:{display:false},
           ticks:{ maxTicksLimit:4, color:'#888780', font:{size:10}, callback: v=>Math.round(v) },
           grid:{ color:'rgba(0,0,0,.05)' } }
    },
    plugins:{ legend:{display:false} }
  }
});

// --- Card + chart updater ---
function updateCards(evt) {
  const d = JSON.parse(evt.detail.xhr.responseText);

  document.getElementById('c-total').textContent = d.total_pkts.toLocaleString();
  const kb = d.total_bytes / 1024;
  document.getElementById('c-data').textContent =
    kb > 1024 ? (kb/1024).toFixed(1)+' MB' : Math.round(kb)+' KB';
  document.getElementById('c-conns').textContent = d.connections;
  document.getElementById('c-flag').textContent  = d.flagged;

  // update donut
  protoChart.data.datasets[0].data = PROTOS.map(p => d.protos[p] || 0);
  protoChart.update('none');

  // update legend
  const total = PROTOS.reduce((s,p)=>s+(d.protos[p]||0),0)||1;
  document.getElementById('proto-legend').innerHTML = PROTOS.map((p,i)=>
    `<span style="display:flex;align-items:center;gap:3px;">
      <span style="width:9px;height:9px;border-radius:2px;background:${COLORS[i]};display:inline-block;"></span>
      ${p} ${d.protos[p]||0}
    </span>`).join('');

  // update traffic chart
  trafficChart.data.datasets[0].data = d.traffic;
  trafficChart.update();

  // update top IPs
  const maxC = d.top_ips.length ? d.top_ips[0].count : 1;
  document.getElementById('ip-body').innerHTML = d.top_ips.map(e=>`
    <tr>
      <td>${e.ip}</td><td>${e.count}</td>
      <td><div class="bar-bg"><div class="bar-fill" style="width:${Math.round(e.count/maxC*100)}%"></div></div></td>
    </tr>`).join('');
}

// Trim feed to latest 20 rows to avoid DOM bloat
const feedObs = new MutationObserver(()=>{
  const tb = document.getElementById('feed-body');
  while(tb.children.length > 20) tb.removeChild(tb.lastChild);
});
feedObs.observe(document.getElementById('feed-body'),{childList:true});
</script>
</body>
</html>
